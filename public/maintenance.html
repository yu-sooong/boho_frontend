<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>維護中 | 補亦樂乎</title>
    <style>
      :root {
        --brand: #0f6b5c;
        --brand-soft: #e8f5f2;
        --ink: #111827;
        --muted: #6b7280;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        font-family:
          'Noto Sans TC',
          'PingFang TC',
          'Microsoft JhengHei',
          sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, var(--brand-soft) 0%, #fff 45%, #fff8ef 100%);
        text-align: center;
      }
      .brand {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--brand);
      }
      .icon {
        margin: 2rem auto 0;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 9999px;
        display: grid;
        place-items: center;
        background: #fff;
        color: var(--brand);
        box-shadow: 0 1px 2px rgb(0 0 0 / 6%);
        border: 1px solid #d1e7e2;
        font-size: 1.25rem;
      }
      h1 {
        margin: 1.25rem 0 0;
        font-size: 1.25rem;
      }
      p {
        margin: 0.75rem auto 0;
        max-width: 22rem;
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--muted);
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--brand);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">補亦樂乎</p>
      <div class="icon" aria-hidden="true">⚙</div>
      <h1>網站維護中</h1>
      <p>我們正在升級服務，請稍後再回來。造成不便，敬請見諒。</p>
      <a href="mailto:yujiiii543@gmail.com?subject=%E3%80%90%E7%B6%AD%E8%AD%B7%E4%B8%AD%E3%80%91%E8%A9%A2%E5%95%8F"
        >yujiiii543@gmail.com</a
      >
    </main>
  </body>
</html>
